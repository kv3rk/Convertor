<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Converter</title>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-sm p-4 mb-4">
        <h1 class="text-center mb-4">Keyboard converter</h1>

        <form th:action="@{/translate/convert}" th:object="${pojo}" method="post">
            <div class="mb-3">
                <label class="form-label">Paste text:</label>
                <textarea th:field="*{wrongString}" placeholder="Paste here"
                          class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Convert</button>
        </form>
    </div>

    <div th:if="${pojo.rightString != null}" class="alert alert-success text-center">
        <h4>Result:</h4>
        <span th:text="${pojo.rightString}" class="display-6"></span>
    </div>
    <div class="history text-center pt-5">
        <a th:href="@{/translate/history}" class="btn btn-primary w-30">Show full history</a>
    </div>
</div>
</body>
</html>
