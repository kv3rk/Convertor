<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Convertor</title>

    <!--    CSS-->
    <link rel="stylesheet" href="/css/auth-pages/auth-pages-style.css"/>
    <link rel="stylesheet" href="/css/common.css"/>

    <!--    Icon-->
    <link rel="icon" type="image/x-icon" href="/img/main-pages/keyboard_simple.png"/>

    <!--    Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-card">

    <div class="title">Sign Up</div>

    <span id="user-registration-failure-label"
          th:if="${registrationError}"
          th:text="${registrationError}">
    </span>

    <form th:action="@{/translate/getCredentials}" th:object="${registerUserDTO}" method="post">

        <input type="text"
               th:field="*{nickname}"
               class="form-control"
               placeholder="Username"
               id="username-field">
        <span class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></span>

        <input type="password"
               th:field="*{password}"
               class="form-control"
               placeholder="Password"
               id="username-pass">
        <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>

        <button class="btn-auth" type="submit">
            Sign Up
        </button>

    </form>

    <a class="btn-redirect" th:href="@{/translate/login}">Already have account?</a>

</div>

</body>
</html>
