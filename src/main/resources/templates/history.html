<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">


<head>

    <meta charset="UTF-8">

    <!--    Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
            defer></script>

    <title>History</title>

    <!--    Script files-->
    <script defer src="/js/history-page/removing.js"></script>
    <script defer src="/js/history-page/reset_after_removing.js"></script>

    <!--    CSS files-->
    <link rel="stylesheet" href="/css/history-page/history-page-style.css"/>
    <link rel="stylesheet" href="/css/common.css"/>

    <!--    Page icon-->
    <link rel="icon" type="image/x-icon" href="/img/history-page/history.png"/>

    <!--    Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>


<body class="bg-light">

<!-- Account trigger button (top-left corner) -->
<button type="button"
        class="account-trigger"
        data-bs-toggle="offcanvas"
        data-bs-target="#accountPanel"
        aria-controls="accountPanel"
        aria-label="Open account menu">
    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="2" y1="4.5" x2="16" y2="4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="13.5" x2="16" y2="13.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
</button>

<!-- Account offcanvas panel -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="accountPanel" aria-labelledby="accountPanelLabel">

    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="accountPanelLabel" th:text="${sessionUsername}">Username</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>

    <div class="offcanvas-body">
        <ul class="account-menu">
            <li>
                <a th:href="@{/profile}" class="account-menu-item">Profile</a>
            </li>
            <li>
                <a th:href="@{/settings}" class="account-menu-item">Settings</a>
            </li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="account-menu-item logout">Logout</button>
                </form>
            </li>
        </ul>
    </div>

</div>

<!--Main container-->
<div class="container text-center mt-5">

    <!--    Full translate history table-->
    <div class="tablecontainer">

        <h3 class="mb-5">Convertion history</h3>

        <table style="width:100%" border="3"
               class="table table-striped table-responsive-md"
               id="full-history-table">

            <thead>
            <tr>
                <th>Creation time</th>
                <th>Wrong</th>
                <th>Right</th>
                <th class="actions-col">
                    <button id="delete-all-button"
                            onclick="delete_all_button(event)"
                            class="btn btn-danger">
                        Delete all
                    </button>
                </th>
            </tr>
            </thead>

            <tbody id="full-history-table-body">
            <tr th:each="element : ${full_history}">
                <td th:text="${element.time}"></td>
                <td th:text="${element.wrongString}"></td>
                <td th:text="${element.rightString}"></td>
                <td class="actions-col">
                    <button th:id="${element.id}"
                            onclick="delete_target_button(event)"
                            class="btn btn-danger">
                        Remove
                    </button>
                </td>
            </tr>
            </tbody>

        </table>

    </div>

    <!--Main translate page-->
    <div class="backbtn mt-5">

        <a th:href="@{/translate/main}" class="btn btn-primary mb-2 mt-2">Back</a>

    </div>


</div>


</body>


</html>
