<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">


<head>

    <meta charset="UTF-8">

    <!--    Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
            defer></script>

    <title>Converter</title>

    <!--    Script files-->
    <script defer src="/js/translate-page/wrong_string_convertion.js"></script>
    <script defer src="/js/translate-page/failed_convertion_notification.js"></script>
    <script defer src="/js/translate-page/success_convertion_notification.js"></script>
    <script defer src="/js/translate-page/error_handling.js"></script>
    <script defer src="/js/translate-page/draw_recent_history_table.js"></script>

    <!--    CSS files-->
    <link rel="stylesheet" href="/css/translate-page/translate-page-style.css"/>
    <link rel="stylesheet" href="/css/translate-page/convertion-notification.css"/>
    <link rel="stylesheet" href="/css/common.css"/>

    <!--    Page icon-->
    <link rel="icon" type="image/x-icon" href="/img/main-pages/keyboard_simple.png"/>

    <!--    Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>


<body class="bg-light">

<!-- Account trigger button (top-left corner) -->
<button type="button"
        class="account-trigger"
        data-bs-toggle="offcanvas"
        data-bs-target="#accountPanel"
        aria-controls="accountPanel"
        aria-label="Open account menu">
    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="2" y1="4.5" x2="16" y2="4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="13.5" x2="16" y2="13.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
</button>

<!-- Account offcanvas panel -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="accountPanel" aria-labelledby="accountPanelLabel">

    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="accountPanelLabel">Username</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>

    <div class="offcanvas-body">
        <ul class="account-menu">
            <li>
                <a th:href="@{/profile}" class="account-menu-item">Profile</a>
            </li>
            <li>
                <a th:href="@{/settings}" class="account-menu-item">Settings</a>
            </li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="account-menu-item logout">Logout</button>
                </form>
            </li>
        </ul>
    </div>

</div>


<!--Main container-->
<div class="container mt-5" id="main-container">

    <!--    Convertor Card-->
    <div class="card shadow-sm p-4 mb-4">

        <h1 class="text-center mb-4">Keyboard converter</h1>

        <!--        Form to translate text-->
        <form onsubmit="convert(event)">

            <label class="form-label">Paste text:</label>

            <textarea id="wrong-string-textarea" placeholder="Paste here"
                      class="form-control" rows="3"></textarea>

            <button type="submit" class="btn btn-primary w-100 mt-2"
                    id="wrong-string-button">Convert
            </button>

        </form>

    </div>


    <!--    Success convertion notification-->
    <div id="success-convertion-notification" class="alert alert-success">

        <h3 id="success-convertion-notification-label">Result:</h3>

        <span id="success-convertion-notification-text"></span>

    </div>


    <!--    Failed convertion notification-->
    <div id="failed-convertion-notification" class="alert alert-danger">

        <h3 id="failed-convertion-notification-label">Error:</h3>

        <span id="failed-convertion-notification-text"></span>


    </div>


    <!--    Recent translate history-->
    <div class="mt-5" id="recent-history">

        <h5 class="mb-1 text-center">Recent changes</h5>

        <table style="width:80%" border="2" class="table table-striped table-responsive-md"
               align="center" id="recent-history-table">

            <tbody>

            <tr th:each="string : ${recentList}">
                <td th:text="${string.wrongString}"></td>
                <td th:text="${string.rightString}"></td>
            </tr>

            </tbody>

        </table>

    </div>


    <!--    Full translate history-->
    <div class="history text-center pt-5 mb-2">

        <a th:href="@{/translate/history}" class="btn btn-primary w-30">Show full history</a>

    </div>


</div>


</body>


</html>
